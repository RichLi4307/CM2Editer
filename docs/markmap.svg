<svg xmlns="http://www.w3.org/2000/svg" class="markmap mm-aki3oe-6" style="width: 100%; height: 100%; -webkit-tap-highlight-color: rgba(0, 0, 0, 0);"><style>.markmap{--markmap-max-width: 9999px;--markmap-a-color: #0097e6;--markmap-a-hover-color: #00a8ff;--markmap-code-bg: #f0f0f0;--markmap-code-color: #555;--markmap-highlight-bg: #ffeaa7;--markmap-table-border: 1px solid currentColor;--markmap-font: 300 16px/20px sans-serif;--markmap-circle-open-bg: #fff;--markmap-text-color: #333;--markmap-highlight-node-bg: #ff02;font:var(--markmap-font);color:var(--markmap-text-color)}.markmap-link{fill:none}.markmap-node&gt;circle{cursor:pointer}.markmap-foreign{display:inline-block}.markmap-foreign p{margin:0}.markmap-foreign a{color:var(--markmap-a-color)}.markmap-foreign a:hover{color:var(--markmap-a-hover-color)}.markmap-foreign code{padding:.25em;font-size:calc(1em - 2px);color:var(--markmap-code-color);background-color:var(--markmap-code-bg);border-radius:2px}.markmap-foreign pre{margin:0}.markmap-foreign pre&gt;code{display:block}.markmap-foreign del{text-decoration:line-through}.markmap-foreign em{font-style:italic}.markmap-foreign strong{font-weight:700}.markmap-foreign mark{background:var(--markmap-highlight-bg)}.markmap-foreign table,.markmap-foreign th,.markmap-foreign td{border-collapse:collapse;border:var(--markmap-table-border)}.markmap-foreign img{display:inline-block}.markmap-foreign svg{fill:currentColor}.markmap-foreign&gt;div{width:var(--markmap-max-width);text-align:left}.markmap-foreign&gt;div&gt;div{display:inline-block}.markmap-highlight rect{fill:var(--markmap-highlight-node-bg)}.markmap-dark .markmap{--markmap-code-bg: #1a1b26;--markmap-code-color: #ddd;--markmap-circle-open-bg: #444;--markmap-text-color: #eee}</style><g transform="translate(20,300) scale(1.2903225806451613)"><path class="markmap-link" data-depth="2" data-path="1.2" d="M0,1.25C40,1.25,40,-60,80,-60" stroke-width="1.75" stroke="rgb(255, 127, 14)"/><path class="markmap-link" data-depth="2" data-path="1.3" d="M0,1.25C40,1.25,40,-31.25,80,-31.25" stroke-width="1.75" stroke="rgb(44, 160, 44)"/><path class="markmap-link" data-depth="2" data-path="1.4" d="M0,1.25C40,1.25,40,-2.5,80,-2.5" stroke-width="1.75" stroke="rgb(214, 39, 40)"/><path class="markmap-link" data-depth="2" data-path="1.5" d="M0,1.25C40,1.25,40,26.25,80,26.25" stroke-width="1.75" stroke="rgb(148, 103, 189)"/><path class="markmap-link" data-depth="2" data-path="1.6" d="M0,1.25C40,1.25,40,55,80,55" stroke-width="1.75" stroke="rgb(140, 86, 75)"/><path class="markmap-link" data-depth="2" data-path="1.7" d="M0,1.25C40,1.25,40,83.75,80,83.75" stroke-width="1.75" stroke="rgb(227, 119, 194)"/><g class="markmap-highlight"/><g data-depth="2" data-path="1.2" class="markmap-node" transform="translate(80, -82.875)"><line stroke="#ff7f0e" stroke-width="1.75" x1="-1" x2="194" y1="22.875" y2="22.875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="176" height="22"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">1. 使用 Rust 2021 Edition</div></div></foreignObject></g><g data-depth="2" data-path="1.3" class="markmap-node" transform="translate(80, -54.125)"><line stroke="#2ca02c" stroke-width="1.75" x1="-1" x2="346" y1="22.875" y2="22.875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="328" height="22"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">2. 所有错误用 Result&lt;T, E&gt; 处理，不要 unwrap</div></div></foreignObject></g><g data-depth="2" data-path="1.4" class="markmap-node" transform="translate(80, -25.375)"><line stroke="#d62728" stroke-width="1.75" x1="-1" x2="416" y1="22.875" y2="22.875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="398" height="22"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">3. 数据结构必须 derive Clone（除非有明确理由不克隆）</div></div></foreignObject></g><g data-depth="2" data-path="1.5" class="m